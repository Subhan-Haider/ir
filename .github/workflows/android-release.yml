name: Android CI / CD CD Release Workflow

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Trigger release on version tags like v1.0.0
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build SmartHub Universal Remote
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Debug APK
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Build Unsigned Release APK
      working-directory: ./android
      run: ./gradlew assembleRelease

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmartHub-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release Unsigned APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmartHub-Release-Unsigned-APK
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk


  release:
    name: Generate GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # Download the artifacts from the build step
      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: SmartHub-Debug-APK
          path: output/debug/

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: SmartHub-Release-Unsigned-APK
          path: output/release/

      # Generate an automatic release in the repo with the APKs attached
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/debug/app-debug.apk
            output/release/app-release-unsigned.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
